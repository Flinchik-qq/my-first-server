<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huynyao</title>
    <style>
        :root {
            --primary: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        /* Плавно переливающийся анимированный фон */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0c4a6e, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Карточка с эффектом матового стекла и левитации */
        .container {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* Анимация появления и бесконечного парения */
            animation: dropIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards, 
                       float 6s ease-in-out infinite alternate 1s;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }

        @keyframes dropIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-15px); }
        }

        /* Текст с бегущим металлическим бликом */
        h1 {
            margin: 0 0 10px 0;
            font-size: 2.2rem;
            background: linear-gradient(90deg, #38bdf8, #fff, #38bdf8);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-size: 1.05rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Кнопки с неоновым эффектом при наведении */
        a {
            display: inline-block;
            padding: 14px 24px;
            background: rgba(14, 165, 233, 0.1);
            color: var(--primary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid rgba(14, 165, 233, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        a:hover {
            background: #0ea5e9;
            color: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px -10px rgba(14, 165, 233, 0.8);
            border-color: #0ea5e9;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 10px 20px -10px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .status {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* Пульсирующая точка статуса */
        .dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>heloooo my brooooo btw</h1>
        <p>Добро пожаловать на мой первый сервер. Работает как полная хуйняяя</p>
        
        <div class="links">
            <a href="/api">Проверить API</a>
            <a href="/balance" class="btn-secondary">Посмотреть баланс</a>
        </div>

        <div class="status">
            <div class="dot"></div>
            Сервер онлайн
        </div>
    </div>
</body>
</html>
